name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MdViewer ${{ github.ref_name }}'
          releaseBody: |
            ## MdViewer ${{ github.ref_name }}

            ### Installation
            Download `MdViewer_*_x64-setup.exe` and run the installer.

            ### What's new
            See [commits since last release](https://github.com/${{ github.repository }}/compare/.../${{ github.ref_name }}).
          releaseDraft: false
          prerelease: false
